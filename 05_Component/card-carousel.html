<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
 
    <div class="container mt-4">
      <div class="row">
        <div class="col">
          <div class="carousel slide carousel-fade" id="carousel-slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://placehold.co/1200x400"  alt="">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/1200x400"  alt="">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/1200x400"  alt="">
                </div>
                <div class="carousel-indicators">
                    <button class="active" data-bs-target="#carousel-slide" data-bs-slide-to="0"></button>
                    <button  data-bs-target="#carousel-slide" data-bs-slide-to="1"></button>
                    <button  data-bs-target="#carousel-slide" data-bs-slide-to="2"></button>

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carousel-slide" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previus</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carousel-slide" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
                
                
            </div>
          
          
       
    </div>










 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
    
<script>
    const myCarouselElement = document.querySelector('#carousel-slide')

const carousel = new bootstrap.Carousel(myCarouselElement, {
  interval: 500,
  touch: false
})
</script>
</body>
</html>
