<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
 
    

<div class="container mt-4">
    <form>
        <div class="mb-3">
            <label for="user-name" class="form-label">
                Kullanıcı adı:
            </label>
            <input type="text" id="user-name" placeholder="Kullanıcı Adinizi Giriniz.." class="form-control form-control-sm">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">
               Email 
            </label>
            <input type="email" id="email" placeholder="Emailinizi Giriniz..." class="form-control form-control-lg">
        </div>
        <div class="mb-3">
            <label for="text" class="form-label">
                Adiniz:
            </label>
            <input type="text" placeholder="Adinizi Giriniz"  class="form-control" disabled>
        </div>
        <div class="mb-3">
            <label for="input-file">File uplaoad</label>
            <input type="file" name="" class="form-control" id="">
        </div>
    </form>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
    
</body>
</html>
